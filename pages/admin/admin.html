<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../assets/img/iconoPepitaCafe-dark.svg">
    <title>Admin</title>
    <!-- Librería de Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="../../components/product/productForm.css">
    <link rel="stylesheet" href="../../components/menuAdmin/menuAdmin.css">
</head>

<body>
    <div class="dashboard-container">

        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <!-- <span>Dashboard</span>
            <div class="user-info">🔔 👤 🖼️</div> -->
            </header>

            <section class="content-padding">
                <h2>Dashboard</h2>
                <p>Bienvenido de vuelta a historias de café</p>

                <div class="stats-grid">
                    <div class="stat-card"><strong>$0</strong><span>Ventas Totales</span></div>
                    <div class="stat-card"><strong>0</strong><span>Ordenes hoy</span></div>
                    <div class="stat-card"><strong>0</strong><span>Usuarios Activos</span></div>
                    <div class="stat-card"><strong>0</strong><span>Stock bajo</span></div>
                </div>

                <div class="form-section">
                    <h3>Cargar Nuevo Producto</h3>

                </div>

                <div class="table-section">
    <div class="table-header">
        <h3>Productos Disponibles</h3>
        <button class="btn-add">
            <i class="bi bi-plus-circle me-2"></i> Añadir productos
        </button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="text-left">Nombre del Producto</th>
                    <th class="text-right">Precio</th>
                    <th class="text-right">Stock</th>
                    <th class="text-center">Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                <!-- Se llena dinámicamente -->
            </tbody>
        </table>
    </div>
</div>
            </section>
        </main>
    </div>
    <div id="modal-producto" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Añadir Nuevo Producto</h3>
            <div id="productform-container"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/menuAdmin.js"></script>
    <script src="../../js/products.js"></script>
    <script src="../../js/main.js"></script>
</body>

</html>
