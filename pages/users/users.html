<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historias de Café - Acceso</title>
    <link rel="stylesheet" href="users.css">
    <link rel="icon" type="image/x-icon" href="../../assets/img/iconoPepitaCafe-dark.svg">
    <link rel="stylesheet" href="../../components/register/register.css">
    <link rel="stylesheet" href="../../components/login/login.css">
     <link rel="stylesheet" href="../../assets/css/paletaColores.css">
    <!-- iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@10"></script>
</head>
<body>

    <div class="hero-background">
        <img src="../../assets/img/userBackground.png" alt="Finca de Café" class="bg-image-anim">
        <div class="overlay"></div>
    </div>

    <main class="main-content">
        <div class="container">
            <div class="brand-section">
                <div class="brand-content">
                    <h1>Historias de Café</h1>
                    <p>Conectamos paladares exigentes con el corazón de la montaña. Tu viaje al origen comienza aquí.</p>
                </div>
            </div>

            <div class="auth-wrapper">
                <div class="glass-card">
                    
               
                    <div id="login-container"></div>

                    <div id="register-container" class="hidden"></div>

                </div>
            </div>

        </div>
    </main>

    <script>
        function switchView() {
            const login = document.getElementById('login-container');
            const register = document.getElementById('register-container');
            
            login.classList.toggle('hidden');
            register.classList.toggle('hidden');
        }
    </script>
    <script src="../../js/validators.js"></script>
    <script src="../../js/register.js"></script>
    <script src="../../js/login.js"></script>
    <script src="../../js/main.js"></script>
    


</body>
</html>
