<div class="auth-component" id="login-container">
    <div class="component-header">
        <i class="fas fa-coffee"></i>
        <h2>Inicia Sesión en tu Origen</h2>
    </div>
    <form id="login-form" class="auth-form">
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <div class="password-wrapper">
                <input type="password" name="password" id="login-pass" placeholder="******" required>
                <a href="#" class="forgot-link">Olvidé mi contraseña</a>
            </div>
        </div>
        <button type="submit" class="btn-coffee">
            <i class="fas fa-sign-in-alt"></i> ENTRAR
        </button>
        <div class="separator"><span>o</span></div>
        <button type="button" class="btn-google">
            <img src="https://image.pngaaa.com/880/23880-middle.png" alt="G"> Entrar con Google
        </button>
    </form>
    <p class="toggle-text">¿No tienes cuenta? <a href="#" onclick="showRegister()">Crear Cuenta</a></p>
</div>
